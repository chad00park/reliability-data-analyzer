name: Build Execution File (.EXE) - Lightweight Edition

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 소스코드 체크아웃
      uses: actions/checkout@v4

    - name: 파이썬 3.10 라이트 버전 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 초경량 최소 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl numpy matplotlib PySide6 pyinstaller

    - name: 초경량 하드코어 다이어트 단일 폴더 패키징 (MKL, Qt5, 테스트 모듈 제외)
      run: |
        pyinstaller --noconfirm --onedir --windowed --clean --name="Rel_Analyzer" `
        --exclude-module="scipy" `
        --exclude-module="mkl" `
        --exclude-module="libopenblas" `
        --exclude-module="Tkinter" `
        --exclude-module="tkinter" `
        --exclude-module="PyQt5" `
        main.py

    - name: 빌드 완료 파일 압축 및 패키징
      run: |
        powershell Compress-Archive -Path dist/Rel_Analyzer -DestinationPath Rel_Analyzer_Windows.zip

    - name: 결과물 업로드 (Artifacts 저장)
      uses: actions/upload-artifact@v4
      with:
        name: Reliability-Data-Analyzer-EXE
        path: Rel_Analyzer_Windows.zip
        retention-days: 7
